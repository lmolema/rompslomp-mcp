  "/api/v1/companies/{company_id}/sales_invoices/{sales_invoice_id}/attachments/{id}":
    parameters:
    - "$ref": "#/parameters/company_id"
    - name: sales_invoice_id
      in: path
      type: string
      description: Sale Invoice ID
      required: true
    - name: id
      in: path
      type: string
      description: Attachment ID
      required: true
    delete:
      summary: delete sales invoice
      tags:
      - Sales invoices
      responses:
        '204':
          description: successful
    get:
      summary: download invoice attachment
      tags:
      - Sales invoices
      produces:
      - application/pdf
      responses:
        '200':
          description: successful
  "/api/v1/companies/{company_id}/sales_invoices/{id}/pdf":
    parameters:
    - "$ref": "#/parameters/company_id"
    - name: id
      in: path
      type: string
      description: ID
      required: true
    get:
      summary: download sales invoices pdf
      tags:
      - Sales invoices
      produces:
      - application/pdf
      responses:
        '200':
          description: successful
          schema:
            type: binary
          examples:
            application/json:
              message: Factuur wordt niet gepubliceerd
  "/api/v1/companies/{company_id}/sales_invoices/{sales_invoice_id}/attachments":
    parameters:
    - "$ref": "#/parameters/company_id"
    - name: sales_invoice_id
      in: path
      type: string
      description: Sale Invoice ID
      required: true
    post:
      summary: upload an attachment
      tags:
      - Sales invoices
      parameters:
      - name: attachment_object
        in: body
        type: string
        description: It expects base64 file
        schema:
          type: object
          properties:
            attachment_object:
              type: object
              properties:
                attachment:
                  description:
                    type: string
                    format: string
                    write_only: true
                    description: Base64 encoded file
                  x-nullable: true
                attachment_file_name:
                  type: string
                  x-nullable: true
          required:
          - attachment_object
      responses:
        '200':
          description: successful
          examples:
            application/json:
              attachment_object:
                id: 681363806
                attachment: "/api/v1/companies/1023508573/sales_invoices/748551423/attachments/681363806"
                attachment_file_name: file_name.pdf
                attachment_content_type: application/octet-stream
                attachment_file_size: 7
