        format: date
        description: Filter quotations by minimum date. ISO 8601 formatted, e.g. "2020-01-31".
      - name: search[till]
        in: query
        type: string
        format: date
        description: Filter quotations by maximum date. ISO 8601 formatted, e.g. "2020-01-31".
      - name: search[contact_id]
