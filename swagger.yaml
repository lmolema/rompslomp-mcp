parameters:
  company_id:
    name: company_id
    in: path
    type: string
    description: Company ID.
    required: true
  page:
    name: page
    in: query
    type: integer
    description: Page number.
    default: 1
  per_page:
    name: per_page
    in: query
    type: integer
    description: Number of objects to return per page, in range of 0 to 100.
    default: 40
securityDefinitions:
  BearerTokenAuth:
    type: apiKey
    in: header
    name: Authorization
  OAuth2:
    type: oauth2
    flow: accessCode
    authorizationUrl: "/oauth/authorize"
    tokenUrl: "/oauth/token"
    scopes:
      public: fetch general information (a.o. companies, VAT types)
      manage:companies: manage companies
      manage:contacts: manage contacts
      manage:sales_invoices: manage sales invoices
      manage:payments: manage payments
      manage:products: manage products
      read:accounts: fetch account details (e.g. revenue, assets, liabilities, etc.)
      manage:journal_entries: manage journal entries
      read:me: fetch user details (a.o. name, email address)
      manage:hours: manage hours
      manage:rides: manage rides
      manage:expenses: manage expenses
      manage:quotations: manage quotations
security:
- BearerTokenAuth: []
- OAuth2: []
paths:
  "/api/v1/companies/{company_id}/rides":
    parameters:
    - "$ref": "#/parameters/company_id"
    get:
      summary: list rides
      tags:
      - Rides
      parameters:
      - name: selection
        in: query
        type: string
        enum:
        - all
        - business
        default: all
        description: Name of selection filter to apply.
      - "$ref": "#/parameters/page"
      - "$ref": "#/parameters/per_page"
      responses:
        '200':
          description: successful
          schema:
            type: object
            properties:
              rides:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Read only.
                      x-nullable: true
                    departure_address:
                      type: string
                      x-nullable: true
                    visiting_address:
                      type: string
                      x-nullable: true
                    km_start:
                      type: integer
                      x-nullable: true
                    km_end:
                      type: integer
                      x-nullable: true
                    private:
                      type: boolean
                      x-nullable: true
                    date:
                      type: date
                      x-nullable: true
                  required:
                  - id
                  - departure_address
                  - visiting_address
                  - km_start
                  - km_end
                  - private
                  - date
            required:
            - rides
          examples:
            application/json:
              rides:
              - id: 708176756
                departure_address: Alkmaar
                visiting_address: Utrecht
                km_start: 0
                km_end: 100
                private:
                date: '2024-03-02'
    post:
      summary: create ride
      tags:
      - Rides
      parameters:
      - name: ride
        in: body
        schema:
          type: object
          properties:
            ride:
              type: object
              properties:
                departure_address:
                  type: string
                  x-nullable: true
                visiting_address:
                  type: string
                  x-nullable: true
                km_start:
                  type: integer
                  x-nullable: true
                km_end:
                  type: integer
                  x-nullable: true
                private:
                  type: boolean
                  x-nullable: true
                date:
                  type: date
                  x-nullable: true
          required:
          - ride
          example:
            ride:
              departure_address: Alkmaar
              visiting_address: Utrecht
              km_start: 0
              km_end: 100
              private:
              date: '2024-03-02'
        required: true
      responses:
        '201':
          description: successful
          schema:
            type: object
            properties:
              ride:
                type: object
                properties:
                  id:
                    type: integer
                    description: Read only.
                    x-nullable: true
                  departure_address:
                    type: string
                    x-nullable: true
                  visiting_address:
                    type: string
                    x-nullable: true
                  km_start:
                    type: integer
                    x-nullable: true
                  km_end:
                    type: integer
                    x-nullable: true
                  private:
                    type: boolean
                    x-nullable: true
                  date:
                    type: date
                    x-nullable: true
                required:
                - id
                - departure_address
                - visiting_address
                - km_start
                - km_end
                - private
                - date
            required:
            - ride
          examples:
            application/json:
              ride:
                id: 681363806
                departure_address: Alkmaar
                visiting_address: Utrecht
                km_start: 0
                km_end: 100
                private:
                date: '2024-03-02'
        '422':
          description: validation errors
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - client.parameters.validation
                  message:
                    type: string
                description: Please switch on the response's status code and/or error
                  type when handling errors. Error messages may change over time.
                required:
                - type
                - message
            required:
            - error
          examples:
            application/json:
              error:
                message: 'Rit is invalid: Date moet opgegeven zijn. Eindstand teller
                  is geen getal. Eindstand teller moet opgegeven zijn.'
                type: client.parameters.validation
