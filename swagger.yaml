  "/api/v1/companies/{company_id}/products":
    parameters:
    - "$ref": "#/parameters/company_id"
    post:
      summary: create product
      tags:
      - Products
      parameters:
      - name: product
        in: body
        schema:
          type: object
          properties:
            product:
              type: object
              properties:
                has_stock:
                  type: boolean
                  description: true if a stock is kept
                  default: false
                  x-nullable: true
                invoice_line:
                  type: object
                  properties:
                    description:
                      type: string
                      description: Description of the product or service in no more
                        than 255 characters.
                      x-nullable: true
                    extended_description:
                      type: string
                      description: Extended description of the invoice line.
                      x-nullable: true
                    price_per_unit:
                      type: string
                      description: This property states the price with VAT excluded
                        Arbitrary-precision floating point number represented as a
                        string.
                      x-nullable: true
                    vat_rate:
                      type: string
                      description: Tax rate expressed by a decimal number, e.g. "0.21"
                        means 21%. This property is derived from the invoice line's
                        VAT type, unless that type is "custom", in which case a custom
                        vat_rate must be provided. In other cases the given vat_rate
                        is ignored. Arbitrary-precision floating point number represented
                        as a string.
                      x-nullable: true
                    vat_type_id:
                      type: integer
                      description: Defaults to company's default VAT type or VAT type
                        "vat_high".
                      x-nullable: true
                    account_id:
                      type: integer
                      x-nullable: true
                    account_path:
                      description: When both account_path and account_id are given
                        the latter has precedence.
                      x-nullable: true
                    product_code:
                      type: string
                      description: Max 100 characters. If left blank a new code is
                        automatically generated and assigned
                      x-nullable: true
                  x-nullable: true
          required:
          - product
          example:
            product:
              has_stock: true
              invoice_line:
                description: Machine
                extended_description:
                price_per_unit: '1895.0'
                vat_rate:
                vat_type_id: 708176756
                account_id:
                account_path:
                product_code: P4
        required: true
      responses:
        '422':
          description: validation errors
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - client.parameters.validation
                  message:
                    type: string
                description: Please switch on the response's status code and/or error
                  type when handling errors. Error messages may change over time.
                required:
                - type
                - message
            required:
            - error
          examples:
            application/json:
              error:
                message: 'Product is invalid: Stuksprijs moet opgegeven zijn.'
                type: client.parameters.validation
        '201':
          description: successful
          schema:
            type: object
            properties:
              product:
                type: object
                properties:
                  id:
                    type: integer
                    description: Read only.
                    x-nullable: true
                  number_sold:
                    type: integer
                    description: Read only.
                    x-nullable: true
                  has_stock:
                    type: boolean
                    description: true if a stock is kept
                    default: false
                    x-nullable: true
                  invoice_line:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Read only.
                        x-nullable: true
                      description:
                        type: string
                        description: Description of the product or service in no more
                          than 255 characters.
                        x-nullable: true
                      extended_description:
                        type: string
                        description: Extended description of the invoice line.
                        x-nullable: true
                      price_per_unit:
                        type: string
                        description: This property states the price with VAT excluded
                          Arbitrary-precision floating point number represented as
                          a string.
                        x-nullable: true
                      price_with_vat:
                        type: string
                        description: Arbitrary-precision floating point number represented
                          as a string. Read only.
                        x-nullable: true
                      price_without_vat:
                        type: string
                        description: Arbitrary-precision floating point number represented
                          as a string. Read only.
                        x-nullable: true
                      vat_amount:
                        type: string
                        description: Amount of VAT in Euro. Arbitrary-precision floating
                          point number represented as a string. Read only.
                        x-nullable: true
                      vat_rate:
                        type: string
                        description: Tax rate expressed by a decimal number, e.g.
                          "0.21" means 21%. This property is derived from the invoice
                          line's VAT type, unless that type is "custom", in which
                          case a custom vat_rate must be provided. In other cases
                          the given vat_rate is ignored. Arbitrary-precision floating
                          point number represented as a string.
                        x-nullable: true
                      vat_type_id:
                        type: integer
                        description: Defaults to company's default VAT type or VAT
                          type "vat_high".
                        x-nullable: true
                      quantity:
                        type: string
                        description: Arbitrary-precision floating point number represented
                          as a string. Read only.
                        x-nullable: true
                      product_id:
                        type: integer
                        description: Read only.
                        x-nullable: true
                      account_id:
                        type: integer
                        x-nullable: true
                      account_path:
                        description: When both account_path and account_id are given
                          the latter has precedence.
                        x-nullable: true
                      product_code:
                        type: string
                        description: Max 100 characters. If left blank a new code
                          is automatically generated and assigned
                        x-nullable: true
                    required:
                    - id
                    - description
                    - extended_description
                    - price_per_unit
                    - price_with_vat
                    - price_without_vat
                    - vat_amount
                    - vat_rate
                    - vat_type_id
                    - quantity
                    - product_id
                    - account_id
                    - account_path
                    - product_code
                    x-nullable: true
                required:
                - id
                - number_sold
                - has_stock
                - invoice_line
            required:
            - product
          examples:
            application/json:
              product:
                id: 681363806
                number_sold: 0
                has_stock: true
                invoice_line:
                  id: 681363806
                  description: Machine
                  extended_description:
                  price_per_unit: '1895.0'
                  price_with_vat: '2292.95'
                  price_without_vat: '1895.0'
                  vat_amount: '397.95'
                  vat_rate: '0.21'
                  vat_type_id: 708176756
                  quantity: '1.0'
                  product_id:
                  account_id:
                  account_path:
                  product_code: P4
    get:
      summary: list products
      tags:
      - Products
      parameters:
      - name: selection
        in: query
        type: string
        enum:
        - all
        default: all
        description: Name of selection filter to apply.
      - name: search[q]
        in: query
        type: string
        description: 'Query is matched against: invoice_line.product_code, invoice_line.description
          and product category name.'
      - name: search[product_codes][]
        in: query
        type: array
        collectionFormat: multi
