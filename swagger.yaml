        x-nullable: true
      attachment_file_name:
        type: string
        x-nullable: true
      attachment_content_type:
        type: string
        description: Read only.
        x-nullable: true
      attachment_file_size:
        type: integer
        description: Read only.
        x-nullable: true
  Company:
    type: object
    properties:
      id:
        type: integer
        description: Read only.
        x-nullable: true
      name:
        type: string
        x-nullable: true
      owner_name:
        type: string
