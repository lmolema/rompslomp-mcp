---
swagger: '2.0'
info:
  title: Rompslomp API
  version: '1'
definitions:
  Access control:
    type: object
    properties:
      api_accessible:
        type: boolean
        description: If false the company's data is not accessible by means of the
          Rompslomp API because it's on the Gratis subscription. All API access will
          be denied.
        x-nullable: true
      allowed_scopes:
        type: array
        items:
          type: string
          enum:
          - public
          - manage:companies
          - manage:contacts
          - manage:sales_invoices
          - manage:payments
          - manage:products
          - read:accounts
          - manage:journal_entries
          - read:me
          - manage:hours
          - manage:rides
          - manage:expenses
          - manage:quotations
        description: The OAuth scopes that the resource owner is allowed to access
          in the context of the parent company.
  Account:
